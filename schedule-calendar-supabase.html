<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>推しスケジュールカレンダー</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* ログイン画面 */
        #authScreen {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .auth-box {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .auth-box h2 {
            text-align: center;
            color: #667eea;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .auth-tabs {
            display: flex;
            margin-bottom: 25px;
            border-bottom: 2px solid #eee;
        }

        .auth-tab {
            flex: 1;
            padding: 10px;
            text-align: center;
            cursor: pointer;
            color: #999;
            font-weight: bold;
            transition: color 0.2s;
        }

        .auth-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
            margin-bottom: -2px;
        }

        .auth-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .auth-btn {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 5px;
        }

        .auth-btn:hover { background: #5568d3; }

        .auth-msg {
            text-align: center;
            margin-top: 15px;
            font-size: 13px;
            color: #e74c3c;
        }

        .auth-msg.success { color: #27ae60; }

        /* メイン画面 */
        #mainScreen { display: none; }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 28px;
        }

        .logout-btn {
            padding: 8px 18px;
            background: #eee;
            color: #555;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .logout-btn:hover { background: #ddd; }

        .filter-area {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .filter-title { font-weight: bold; margin-bottom: 10px; color: #667eea; }

        .filter-checkboxes { display: flex; flex-wrap: wrap; gap: 15px; }

        .filter-item { display: flex; align-items: center; gap: 5px; }

        .filter-item input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }

        .filter-item label { cursor: pointer; font-size: 14px; }

        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .calendar-nav button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .calendar-nav button:hover { background: #5568d3; }

        .current-month { font-size: 20px; font-weight: bold; color: #333; }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }

        .calendar-header {
            text-align: center;
            padding: 10px;
            font-weight: bold;
            background: #667eea;
            color: white;
            border-radius: 5px;
        }

        .calendar-day {
            min-height: 100px;
            padding: 5px;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .calendar-day:hover { background: #f0f0f0; }

        .calendar-day.other-month { opacity: 0.3; }

        .day-number { font-size: 14px; font-weight: bold; margin-bottom: 5px; }

        .event-item {
            font-size: 11px;
            padding: 2px 4px;
            margin: 2px 0;
            border-radius: 3px;
            color: white;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* モーダル */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header { font-size: 22px; font-weight: bold; margin-bottom: 20px; color: #667eea; }

        .form-group { margin-bottom: 20px; }

        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .youtube-fetch { display: flex; gap: 10px; align-items: flex-end; }
        .youtube-fetch input { flex: 1; }
        .youtube-fetch button {
            padding: 10px 20px;
            background: #FF0000;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            white-space: nowrap;
        }

        .time-input-group { display: flex; align-items: center; gap: 10px; }
        .time-display {
            font-size: 18px;
            font-weight: bold;
            min-width: 120px;
            text-align: center;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .time-buttons { display: flex; flex-direction: column; gap: 5px; }
        .time-buttons button {
            padding: 5px 15px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
        }

        .button-group { display: flex; gap: 10px; margin-top: 20px; }
        .button-group button { flex: 1; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }

        .btn-save { background: #667eea; color: white; }
        .btn-delete { background: #ff4757; color: white; }
        .btn-cancel { background: #ddd; color: #333; }

        .data-management { margin-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .data-management button {
            padding: 10px 20px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* ローディング */
        #loadingOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.7);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: #667eea;
            font-weight: bold;
        }

        #loadingOverlay.active { display: flex; }

        /* ====== スマホ用スタイル ====== */
        /* スマホリスト（デフォルトは非表示） */
        #mobileCalendar { display: none; }

        @media (max-width: 600px) {
            /* 検索結果をスマホ用縦並びに */
            .search-result-item {
                flex-direction: column !important;
                align-items: flex-start !important;
            }
            .search-result-item .search-thumb {
                width: 100% !important;
                height: auto !important;
                aspect-ratio: 16/9;
                order: 2;
            }
            .search-result-item .search-info {
                order: 1;
                width: 100%;
            }
            .search-result-item .search-info div:last-child {
                white-space: normal !important;
            }
            .search-result-item .search-btn {
                order: 3;
                width: 100% !important;
                text-align: center;
            }
            body { padding: 10px; }

            .container { padding: 15px; border-radius: 12px; }

            .header-row { flex-direction: column; gap: 10px; align-items: flex-start; }
            .header-row h1 { font-size: 20px; }
            .header-row div { width: 100%; display: flex; justify-content: flex-end; }

            .calendar-nav { gap: 6px; }
            .calendar-nav button { padding: 7px 12px; font-size: 13px; }
            #yearSelect, #monthSelect { font-size: 13px; padding: 5px 6px; }

            /* カレンダーをリスト形式に切り替え */
            .calendar { display: none; }
            #mobileCalendar { display: block; }

            .filter-area { padding: 10px; }
            .filter-checkboxes { gap: 10px; }

            .data-management { flex-wrap: wrap; }
            .data-management button { font-size: 13px; padding: 8px 14px; }
        }

        .mobile-day-group { margin-bottom: 6px; }

        .mobile-day-header {
            padding: 6px 10px;
            background: #667eea;
            color: white;
            font-weight: bold;
            font-size: 13px;
            border-radius: 6px 6px 0 0;
        }

        .mobile-day-header.no-events {
            background: #e8eaff;
            color: #999;
            border-radius: 6px;
            font-weight: normal;
        }

        .mobile-event-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 10px;
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            margin-bottom: 2px;
            cursor: pointer;
        }

        .mobile-event-item:last-child { border-radius: 0 0 6px 6px; margin-bottom: 0; }

        .mobile-event-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .mobile-event-info { flex: 1; min-width: 0; }

        .mobile-event-title {
            font-size: 13px;
            font-weight: bold;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mobile-event-time { font-size: 11px; color: #888; margin-top: 2px; }

        .mobile-add-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<!-- ローディング -->
<div id="loadingOverlay">読み込み中...</div>

<!-- ログイン画面 -->
<div id="authScreen">
    <div class="auth-box">
        <h2>🎮 推しカレンダー</h2>
        <div class="auth-tabs">
            <div class="auth-tab active" id="loginTab" onclick="switchTab('login')">ログイン</div>
            <div class="auth-tab" id="signupTab" onclick="switchTab('signup')">新規登録</div>
        </div>
        <input type="email" class="auth-input" id="authEmail" placeholder="メールアドレス">
        <input type="password" class="auth-input" id="authPassword" placeholder="パスワード（6文字以上）">
        <button class="auth-btn" id="authBtn" onclick="handleAuth()">ログイン</button>
        <div class="auth-msg" id="authMsg"></div>
    </div>
</div>

<!-- メイン画面 -->
<div id="mainScreen">
    <div class="container">
        <div class="header-row">
            <h1>🎮 推しスケジュールカレンダー</h1>
            <div style="display:flex; gap:10px;">
                <button class="logout-btn" onclick="openSearchModal()" style="background:#667eea; color:white;">🔍 検索</button>
                <button class="logout-btn" onclick="logout()">ログアウト</button>
            </div>
        </div>

        <div class="filter-area">
            <div class="filter-title">表示フィルター</div>
            <div class="filter-checkboxes" id="filterCheckboxes"></div>
        </div>

        <div class="calendar-nav">
            <button onclick="changeMonth(-1)">◀ 前月</button>
            <div style="display:flex; gap:8px; align-items:center;">
                <select id="yearSelect" onchange="changeYearMonth()" style="padding:6px 10px; border:1px solid #ddd; border-radius:8px; font-size:15px; font-weight:bold; color:#333; cursor:pointer;"></select>
                <select id="monthSelect" onchange="changeYearMonth()" style="padding:6px 10px; border:1px solid #ddd; border-radius:8px; font-size:15px; font-weight:bold; color:#333; cursor:pointer;"></select>
            </div>
            <button onclick="changeMonth(1)">次月 ▶</button>
        </div>

        <div class="calendar" id="calendar"></div>
        <div id="mobileCalendar"></div>

        <!-- 一括取得エリア -->
        <div style="margin-top: 20px; padding: 20px; background: #f8f9ff; border-radius: 10px;">
            <div style="font-weight: bold; margin-bottom: 15px; color: #667eea; font-size: 18px;">📺 チャンネルから一括取得</div>
            <div style="display: flex; flex-direction: column; gap: 10px;">
                <input type="text" id="channelUrl" placeholder="チャンネルURLまたはチャンネルID" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px;">
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="fetchStartDate" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px; flex: 1;">
                    <span style="display: flex; align-items: center;">〜</span>
                    <input type="date" id="fetchEndDate" style="padding: 10px; border: 1px solid #ddd; border-radius: 8px; flex: 1;">
                </div>
                <button onclick="bulkFetchVideos()" style="padding: 12px; background: #FF0000; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px;">動画を一括取得</button>
            </div>
        </div>

        <div class="data-management">
            <button onclick="exportJSON()">JSONバックアップ</button>
            <button onclick="importJSON()">JSON復元</button>
        </div>
    </div>
</div>

<!-- 検索モーダル -->
<div class="modal" id="searchModal">
    <div class="modal-content" style="max-width:700px;">
        <div class="modal-header">🔍 検索</div>

        <div style="display:flex; flex-direction:column; gap:12px; margin-bottom:20px;">
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <select id="searchCategory" onchange="updateSearchSubCategories()" style="padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; flex:1;">
                    <option value="">カテゴリ（すべて）</option>
                    <option value="配信">配信</option>
                    <option value="大会">大会</option>
                    <option value="オフイベ">オフラインイベント</option>
                    <option value="グッズ">グッズ発売</option>
                </select>
                <select id="searchSubCategory" style="padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; flex:1;">
                    <option value="">サブカテゴリ（すべて）</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;">
                <input type="text" id="searchKeyword" placeholder="キーワードで検索" style="padding:8px 12px; border:1px solid #ddd; border-radius:8px; font-size:14px; flex:1;" onkeydown="if(event.key==='Enter') doSearch()">
                <button type="button" onclick="doSearch()" style="padding:8px 20px; background:#667eea; color:white; border:none; border-radius:8px; cursor:pointer; font-size:14px; white-space:nowrap;">検索</button>
            </div>
            <div style="display:flex; gap:20px;">
                <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:14px;">
                    <input type="checkbox" id="searchFavorite" style="width:16px; height:16px; cursor:pointer;">
                    <span>💗 お気に入りのみ</span>
                </label>
                <label style="display:flex; align-items:center; gap:6px; cursor:pointer; font-size:14px;">
                    <input type="checkbox" id="searchStarred" style="width:16px; height:16px; cursor:pointer;">
                    <span>⭐ コメント読まれたのみ</span>
                </label>
            </div>
        </div>

        <div id="searchResultCount" style="font-size:13px; color:#888; margin-bottom:10px;"></div>

        <div id="searchResults" style="display:flex; flex-direction:column; gap:6px; max-height:400px; overflow-y:auto;"></div>

        <div style="margin-top:20px; text-align:right;">
            <button type="button" onclick="closeSearchModal()" style="padding:10px 24px; background:#ddd; color:#333; border:none; border-radius:8px; cursor:pointer; font-size:14px;">閉じる</button>
        </div>
    </div>
</div>

<!-- イベントモーダル -->
<div class="modal" id="eventModal">
    <div class="modal-content">
        <div class="modal-header" id="modalHeader">予定を追加</div>

        <div class="form-group">
            <label>YouTube URL</label>
            <div class="youtube-fetch">
                <input type="text" id="youtubeUrl" placeholder="https://youtube.com/...">
                <button onclick="fetchYouTubeData()">取得</button>
            </div>
        </div>

        <button type="button" id="watchBtn" style="display: none; width: 60%; padding: 12px; background: #f08e8e; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 12px; margin-bottom: 10px;">▶ YouTubeで視聴</button>

        <div class="form-group">
            <label>タイトル</label>
            <input type="text" id="eventTitle" placeholder="配信タイトル">
        </div>

        <div class="form-group">
            <label>カテゴリ</label>
            <select id="eventCategory" onchange="updateSubCategories()">
                <option value="配信">配信</option>
                <option value="大会">大会</option>
                <option value="オフイベ">オフラインイベント</option>
                <option value="グッズ">グッズ発売</option>
            </select>
        </div>

        <div class="form-group">
            <label>サブカテゴリ</label>
            <select id="eventSubCategory"></select>
        </div>

        <div class="form-group">
            <label>開始時間</label>
            <div class="time-input-group">
                <input type="time" class="time-display" id="startTimeDisplay" value="22:00">
                <div class="time-buttons">
                    <button onclick="adjustTime('start', 30)">+30分</button>
                    <button onclick="adjustTime('start', -30)">-30分</button>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label>終了時間</label>
            <div class="time-input-group">
                <input type="time" class="time-display" id="endTimeDisplay" value="01:00">
                <div class="time-buttons">
                    <button onclick="adjustTime('end', 30)">+30分</button>
                    <button onclick="adjustTime('end', -30)">-30分</button>
                </div>
            </div>
        </div>

        <div style="display:flex; gap:20px; margin-bottom:15px;">
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:15px;">
                <input type="checkbox" id="isFavorite" style="width:18px; height:18px; cursor:pointer;">
                <span>💗 お気に入り</span>
            </label>
            <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-size:15px;">
                <input type="checkbox" id="isStarred" style="width:18px; height:18px; cursor:pointer;">
                <span>⭐ コメント読まれた</span>
            </label>
        </div>

        <div class="button-group">
            <button type="button" class="btn-save" onclick="saveEvent()">保存</button>
            <button type="button" class="btn-delete" id="deleteBtn" onclick="deleteEvent()" style="display:none;">削除</button>
            <button type="button" class="btn-cancel" onclick="closeModal()">キャンセル</button>
        </div>
    </div>
</div>

<script>
    // ====================================================
    // ここを自分のSupabase情報に書き換えてね！
    // ====================================================
    const SUPABASE_URL = 'https://dzlrvtkfbcoaeeoahrtq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_Fs3svHkD8Q90gFxLuwuAow_lRYtaY_d';
    // ====================================================

    const YOUTUBE_API_KEY = 'AIzaSyCNOHvaz0HS2c-kq7hDjmu4LEkZOn7EVuI';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    const CATEGORIES = {
        '配信': { color: '#E74C3C', subCategories: ['ホラー', 'ゲーム実況', 'コラボ', 'メン限', '案件', 'トーク', '音楽', 'その他'] },
        '大会': { color: '#3498DB', subCategories: ['練習', '個人戦', 'チーム戦', 'その他'] },
        'オフイベ': { color: '#2ECC71', subCategories: ['ファンミ', 'イベント出演', 'その他'] },
        'グッズ': { color: '#F39C12', subCategories: ['通常販売', '限定販売', 'その他'] }
    };

    const SUB_CATEGORY_COLORS = {
        'ホラー': '#9B59B6', 'トーク': '#E67E22', 'ゲーム実況': '#1ABC9C',
        'コラボ': '#E91E63', 'メン限': '#3a9e57', '音楽': '#e3bb4d',
        '案件': '#3a499e', '練習': '#6dbad2', '個人戦': '#3498DB',
        'チーム戦': '#2980B9', 'ファンミ': '#27AE60', 'イベント出演': '#16A085',
        '通常販売': '#F39C12', '限定販売': '#D35400', 'その他': '#95A5A6'
    };

    let events = [];
    let currentDate = new Date();
    let selectedDate = null;
    let editingEventId = null;
    let currentStartTime = 22 * 60;
    let currentEndTime = 60;
    let activeFilters = new Set();
    let currentUser = null;
    let currentTab = 'login';

    // ====================================================
    // 認証まわり
    // ====================================================

    function showLoading() { document.getElementById('loadingOverlay').classList.add('active'); }
    function hideLoading() { document.getElementById('loadingOverlay').classList.remove('active'); }

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('loginTab').classList.toggle('active', tab === 'login');
        document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
        document.getElementById('authBtn').textContent = tab === 'login' ? 'ログイン' : '新規登録';
        document.getElementById('authMsg').textContent = '';
    }

    async function handleAuth() {
        const email = document.getElementById('authEmail').value.trim();
        const password = document.getElementById('authPassword').value;
        const msg = document.getElementById('authMsg');

        if (!email || !password) {
            msg.textContent = 'メールアドレスとパスワードを入力してください';
            msg.className = 'auth-msg';
            return;
        }

        showLoading();
        try {
            if (currentTab === 'login') {
                const { error } = await sb.auth.signInWithPassword({ email, password });
                if (error) throw error;
            } else {
                const { error } = await sb.auth.signUp({ email, password });
                if (error) throw error;
                msg.textContent = '確認メールを送りました！メールのリンクをクリックしてね';
                msg.className = 'auth-msg success';
                hideLoading();
                return;
            }
        } catch (e) {
            msg.textContent = 'エラー: ' + (e.message || '認証に失敗しました');
            msg.className = 'auth-msg';
            hideLoading();
        }
    }

    async function logout() {
        await sb.auth.signOut();

    async function loadEvents() {
        const { data, error } = await sb.from('events').select('*').limit(10000);
        if (error) { console.error(error); return; }
        events = (data || []).map(row => ({
            id: row.id,
            date: row.date,
            title: row.title,
            category: row.category,
            subCategory: row.sub_category,
            startTime: row.start_time,
            endTime: row.end_time,
            youtubeUrl: row.youtube_url,
            color: row.color,
            isFavorite: row.is_favorite || false,
            isStarred: row.is_starred || false
        }));
    }

    async function saveEvent() {
        const title = document.getElementById('eventTitle').value;
        const category = document.getElementById('eventCategory').value;
        const subCategory = document.getElementById('eventSubCategory').value;
        const youtubeUrl = document.getElementById('youtubeUrl').value;

        if (!title) { alert('タイトルを入力してください'); return; }

        const startTime = minutesToTime(currentStartTime);
        const endTime = minutesToTime(currentEndTime);
        const color = SUB_CATEGORY_COLORS[subCategory] || CATEGORIES[category].color;


        showLoading();
        try {
            const isFavorite = document.getElementById('isFavorite').checked;
            const isStarred = document.getElementById('isStarred').checked;
            if (editingEventId) {
                const { error } = await sb.from('events').update({
                    date: selectedDate, title, category,
                    sub_category: subCategory,
                    start_time: startTime, end_time: endTime,
                    youtube_url: youtubeUrl, color,
                    is_favorite: isFavorite,
                    is_starred: isStarred
                }).eq('id', editingEventId);
                if (error) { alert('更新エラー: ' + JSON.stringify(error)); hideLoading(); return; }
                const idx = events.findIndex(e => e.id === editingEventId);
                events[idx] = { id: editingEventId, date: selectedDate, title, category, subCategory, startTime, endTime, youtubeUrl, color, isFavorite, isStarred };
            } else {
                const newId = Date.now().toString();
                const { error } = await sb.from('events').insert({
                    id: newId,
                    user_id: currentUser.id,
                    date: selectedDate, title, category,
                    sub_category: subCategory,
                    start_time: startTime, end_time: endTime,
                    youtube_url: youtubeUrl, color,
                    is_favorite: isFavorite,
                    is_starred: isStarred
                });
                if (error) { alert('追加エラー: ' + JSON.stringify(error)); hideLoading(); return; }
                events.push({ id: newId, date: selectedDate, title, category, subCategory, startTime, endTime, youtubeUrl, color, isFavorite, isStarred });
            }
        } catch(e) {
            hideLoading();
            return;
        }

        hideLoading();
        renderCalendar();
        closeModal();
    }

    async function deleteEvent() {
        if (!confirm('この予定を削除しますか？')) return;
        showLoading();
        const { error } = await sb.from('events').delete().eq('id', editingEventId);
        if (error) { alert('削除に失敗しました'); hideLoading(); return; }
        events = events.filter(e => e.id !== editingEventId);
        hideLoading();
        renderCalendar();
        closeModal();
    }

    function initFilters() {
        const container = document.getElementById('filterCheckboxes');
        container.innerHTML = '';
        Object.keys(CATEGORIES).forEach(category => {
            activeFilters.add(category);
            const item = document.createElement('div');
            item.className = 'filter-item';
            item.innerHTML = `
                <input type="checkbox" id="filter-${category}" checked onchange="toggleFilter('${category}')">
                <label for="filter-${category}" style="color: ${CATEGORIES[category].color}">${category}</label>
            `;
            container.appendChild(item);
        });
    }

    function toggleFilter(category) {
        if (activeFilters.has(category)) { activeFilters.delete(category); }
        else { activeFilters.add(category); }
        renderCalendar();
    }

    function renderCalendar() {
        const calendar = document.getElementById('calendar');
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        // プルダウンを初期化・同期
        const yearSelect = document.getElementById('yearSelect');
        const monthSelect = document.getElementById('monthSelect');

        // 年プルダウン（現在年+2年から現在年-5年）
        const currentYear = new Date().getFullYear();
        yearSelect.innerHTML = '';
        for (let y = currentYear + 2; y >= currentYear - 5; y--) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y + '年';
            if (y === year) opt.selected = true;
            yearSelect.appendChild(opt);
        }

        // 月プルダウン（1月〜12月、上から古い順）
        monthSelect.innerHTML = '';
        for (let m = 1; m <= 12; m++) {
            const opt = document.createElement('option');
            opt.value = m;
            opt.textContent = m + '月';
            if (m === month + 1) opt.selected = true;
            monthSelect.appendChild(opt);
        }
        calendar.innerHTML = '';

        const weekdays = ['日', '月', '火', '水', '木', '金', '土'];
        weekdays.forEach(day => {
            const header = document.createElement('div');
            header.className = 'calendar-header';
            header.textContent = day;
            calendar.appendChild(header);
        });

        const firstDay = new Date(year, month, 1);
        const lastDay = new Date(year, month + 1, 0);
        const startDay = firstDay.getDay();
        const prevMonthLastDay = new Date(year, month, 0).getDate();

        for (let i = startDay - 1; i >= 0; i--) calendar.appendChild(createDayCell(prevMonthLastDay - i, true, year, month - 1));
        for (let day = 1; day <= lastDay.getDate(); day++) calendar.appendChild(createDayCell(day, false, year, month));

        const totalCells = calendar.children.length - 7;
        const remaining = 42 - totalCells;
        for (let day = 1; day <= remaining; day++) calendar.appendChild(createDayCell(day, true, year, month + 1));

        renderMobileCalendar();
    }

    function createDayCell(day, isOtherMonth, year, month) {
        const div = document.createElement('div');
        div.className = 'calendar-day' + (isOtherMonth ? ' other-month' : '');

        const dayNumber = document.createElement('div');
        dayNumber.className = 'day-number';
        dayNumber.textContent = day;
        div.appendChild(dayNumber);

        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEvents = events.filter(e => e.date === dateStr && activeFilters.has(e.category));

        dayEvents.forEach(event => {
            const eventDiv = document.createElement('div');
            eventDiv.className = 'event-item';
            eventDiv.style.background = SUB_CATEGORY_COLORS[event.subCategory] || CATEGORIES[event.category].color;
            const shortTitle = event.title.length > 10 ? event.title.substring(0, 10) + '...' : event.title;
            eventDiv.innerHTML = `${shortTitle}<br>${event.startTime}-${event.endTime}`;
            eventDiv.onclick = (e) => { e.stopPropagation(); openEditModal(event); };
            div.appendChild(eventDiv);
        });

        div.onclick = () => { if (!isOtherMonth) openAddModal(dateStr); };
        return div;
    }

    function renderMobileCalendar() {
        const container = document.getElementById('mobileCalendar');
        if (!container) return;
        container.innerHTML = '';

        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        const lastDay = new Date(year, month + 1, 0).getDate();

        for (let day = 1; day <= lastDay; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const dayEvents = events.filter(e => e.date === dateStr && activeFilters.has(e.category));

            const weekday = ['日', '月', '火', '水', '木', '金', '土'][new Date(year, month, day).getDay()];
            const weekdayColor = weekday === '日' ? '#e74c3c' : weekday === '土' ? '#3498db' : 'white';

            if (dayEvents.length === 0) continue; // 予定のない日はスキップ

            const group = document.createElement('div');
            group.className = 'mobile-day-group';

            const header = document.createElement('div');
            header.className = 'mobile-day-header';
            header.innerHTML = `<span style="color:${weekdayColor}">${month + 1}/${day}（${weekday}）</span>`;
            group.appendChild(header);

            dayEvents.forEach(event => {
                const item = document.createElement('div');
                item.className = 'mobile-event-item';
                item.style.borderLeftColor = SUB_CATEGORY_COLORS[event.subCategory] || CATEGORIES[event.category].color;

                const dot = document.createElement('div');
                dot.className = 'mobile-event-dot';
                dot.style.background = SUB_CATEGORY_COLORS[event.subCategory] || CATEGORIES[event.category].color;

                const info = document.createElement('div');
                info.className = 'mobile-event-info';
                info.innerHTML = `
                    <div class="mobile-event-title">${event.isFavorite ? '💗 ' : ''}${event.isStarred ? '⭐ ' : ''}${event.title}</div>
                    <div class="mobile-event-time">${event.startTime}〜${event.endTime}　${event.subCategory || event.category}</div>
                `;

                item.appendChild(dot);
                item.appendChild(info);

                // サムネイル（YouTubeのURLがある場合）
                if (event.youtubeUrl) {
                    const videoId = extractVideoId(event.youtubeUrl);
                    if (videoId) {
                        const thumb = document.createElement('img');
                        thumb.src = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
                        thumb.style.cssText = 'width:60%; border-radius:6px; margin-top:6px; display:block;';
                        thumb.loading = 'lazy';
                        thumb.onclick = (e) => { e.stopPropagation(); window.open(event.youtubeUrl, '_blank'); };
                        item.style.flexWrap = 'wrap';
                        item.appendChild(thumb);
                    }
                }

                item.onclick = (e) => { if (e.target.tagName !== 'IMG') openEditModal(event); };
                group.appendChild(item);
            });

            container.appendChild(group);
        }

        // 予定がない場合
        if (container.children.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#aaa; padding:30px;">この月の予定はありません</div>';
        }

        // 日付追加ボタン
        const addBtn = document.createElement('div');
        addBtn.className = 'mobile-add-btn';
        addBtn.textContent = '＋ 予定を追加';
        const today = new Date();
        const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
        addBtn.onclick = () => openAddModal(year === today.getFullYear() && month === today.getMonth() ? todayStr : `${year}-${String(month+1).padStart(2,'0')}-01`);
        container.appendChild(addBtn);
    }

    function updateSubCategories() {
        const category = document.getElementById('eventCategory').value;
        const subSelect = document.getElementById('eventSubCategory');
        subSelect.innerHTML = '';
        CATEGORIES[category].subCategories.forEach(sub => {

    function adjustTime(type, minutes) {
        const el = document.getElementById(type === 'start' ? 'startTimeDisplay' : 'endTimeDisplay');
        let t = timeToMinutes(el.value) + minutes;
        if (t < 0) t += 24 * 60;
        if (t >= 24 * 60) t -= 24 * 60;
        el.value = minutesToTime(t);
        if (type === 'start') currentStartTime = t;
        else currentEndTime = t;
    }

    function minutesToTime(m) {
        return `${String(Math.floor(m / 60)).padStart(2, '0')}:${String(m % 60).padStart(2, '0')}`;
    }

    function timeToMinutes(t) {
        const [h, m] = t.split(':').map(Number);
        return h * 60 + m;
    }

    function openAddModal(date) {
        selectedDate = date;
        editingEventId = null;

        document.getElementById('endTimeDisplay').value = '01:00';

        document.getElementById('watchBtn').style.display = 'none';

    // ====================================================
    // YouTube
    // ====================================================

    async function fetchYouTubeData() {
        const url = document.getElementById('youtubeUrl').value;
        const videoId = extractVideoId(url);
        if (!videoId) { alert('正しいYouTube URLを入力してください'); return; }

        try {
            const response = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,liveStreamingDetails&id=${videoId}&key=${YOUTUBE_API_KEY}`);
            const data = await response.json();
            if (data.items && data.items.length > 0) {
                const video = data.items[0];
                document.getElementById('eventTitle').value = video.snippet.title;
                if (video.liveStreamingDetails) {
                    const actualStart = video.liveStreamingDetails.actualStartTime;
                    const actualEnd = video.liveStreamingDetails.actualEndTime;
                    if (actualStart) {
                        const start = new Date(actualStart);
                        const st = `${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`;
                        currentStartTime = timeToMinutes(st);
                        document.getElementById('startTimeDisplay').value = st;
                    }
                    if (actualEnd) {
                        const end = new Date(actualEnd);
                        const et = `${String(end.getHours()).padStart(2,'0')}:${String(end.getMinutes()).padStart(2,'0')}`;
                        currentEndTime = timeToMinutes(et);
                        document.getElementById('endTimeDisplay').value = et;
                    } else if (actualStart) {
                        const dur = parseDuration(video.contentDetails.duration);
                        currentEndTime = (currentStartTime + dur) % (24 * 60);
                        document.getElementById('endTimeDisplay').value = minutesToTime(currentEndTime);
                    }
                } else {
                    const published = new Date(video.snippet.publishedAt);
                    const st = `${String(published.getHours()).padStart(2,'0')}:${String(published.getMinutes()).padStart(2,'0')}`;
                    currentStartTime = timeToMinutes(st);
                    document.getElementById('startTimeDisplay').value = st;
                    const dur = parseDuration(video.contentDetails.duration);
                    currentEndTime = (currentStartTime + dur) % (24 * 60);
                    document.getElementById('endTimeDisplay').value = minutesToTime(currentEndTime);
                }
                alert('データを取得しました！');
            } else {
                alert('動画が見つかりませんでした');
            }
        } catch (e) {
            alert('エラーが発生しました: ' + e.message);
        }
    }

    function extractVideoId(url) {
        const regex = /(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/;
        const match = url.match(regex);
        return match ? match[1] : null;
    }

    function parseDuration(duration) {
        const match = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
        return (parseInt(match[1]||0)*60) + parseInt(match[2]||0) + (parseInt(match[3]||0) > 30 ? 1 : 0);
    }

    async function bulkFetchVideos() {
        const channelInput = document.getElementById('channelUrl').value;
        const startDate = document.getElementById('fetchStartDate').value;
        const endDate = document.getElementById('fetchEndDate').value;

        if (!channelInput) { alert('チャンネルURLまたはIDを入力してください'); return; }
        if (!startDate || !endDate) { alert('取得する期間を指定してください'); return; }

        const channelId = extractChannelId(channelInput);
        const publishedAfter = new Date(startDate).toISOString();
        const publishedBefore = new Date(endDate + 'T23:59:59').toISOString();

        showLoading();
        try {
            const searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&publishedAfter=${publishedAfter}&publishedBefore=${publishedBefore}&maxResults=50&order=date&type=video&key=${YOUTUBE_API_KEY}`;
            const searchData = await (await fetch(searchUrl)).json();
            if (!searchData.items || searchData.items.length === 0) { alert('指定期間の動画が見つかりませんでした'); hideLoading(); return; }

            const videoIds = searchData.items.map(i => i.id.videoId).join(',');
            const detailsData = await (await fetch(`https://www.googleapis.com/youtube/v3/videos?part=snippet,contentDetails,liveStreamingDetails&id=${videoIds}&key=${YOUTUBE_API_KEY}`)).json();

            const newEvents = [];
            detailsData.items.forEach(video => {
                let videoDate, startTime, endTime;
                if (video.liveStreamingDetails && video.liveStreamingDetails.actualStartTime) {
                    const start = new Date(video.liveStreamingDetails.actualStartTime);
                    videoDate = `${start.getFullYear()}-${String(start.getMonth()+1).padStart(2,'0')}-${String(start.getDate()).padStart(2,'0')}`;
                    startTime = `${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`;
                    if (video.liveStreamingDetails.actualEndTime) {
                        const end = new Date(video.liveStreamingDetails.actualEndTime);
                        endTime = `${String(end.getHours()).padStart(2,'0')}:${String(end.getMinutes()).padStart(2,'0')}`;
                    } else {
                        const dur = parseDuration(video.contentDetails.duration);
                        endTime = minutesToTime((timeToMinutes(startTime) + dur) % (24*60));
                    }
                } else {
                    const published = new Date(video.snippet.publishedAt);
                    videoDate = `${published.getFullYear()}-${String(published.getMonth()+1).padStart(2,'0')}-${String(published.getDate()).padStart(2,'0')}`;
                    startTime = `${String(published.getHours()).padStart(2,'0')}:${String(published.getMinutes()).padStart(2,'0')}`;
                    const dur = parseDuration(video.contentDetails.duration);
                    endTime = minutesToTime((timeToMinutes(startTime) + dur) % (24*60));
                }
                newEvents.push({
                    id: Date.now().toString() + Math.random().toString(36).substr(2, 9),
                    user_id: currentUser.id,
                    date: videoDate, title: video.snippet.title,
                    category: '配信', sub_category: 'その他',
                    start_time: startTime, end_time: endTime,
                    youtube_url: `https://www.youtube.com/watch?v=${video.id}`,
                    color: SUB_CATEGORY_COLORS['その他']
                });
            });

            const { error } = await sb.from('events').insert(newEvents);
            if (error) { alert('保存に失敗しました: ' + error.message); hideLoading(); return; }

            newEvents.forEach(e => events.push({
                id: e.id, date: e.date, title: e.title,
                category: e.category, subCategory: e.sub_category,
                startTime: e.start_time, endTime: e.end_time,
                youtubeUrl: e.youtube_url, color: e.color
            }));

            renderCalendar();
            alert(`${newEvents.length}件の動画を追加しました！\nカテゴリは後で編集してね。`);
        } catch (e) {
            alert('エラーが発生しました: ' + e.message);
        }
        hideLoading();
    }

    function extractChannelId(input) {
        const patterns = [/youtube\.com\/channel\/([a-zA-Z0-9_-]+)/, /youtube\.com\/@([a-zA-Z0-9_-]+)/, /youtube\.com\/c\/([a-zA-Z0-9_-]+)/];
        for (let p of patterns) { const m = input.match(p); if (m) return m[1]; }
        return input.trim();
    }

    function exportJSON() {
        const dataStr = JSON.stringify(events, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `schedule-backup-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
    }

    async function importJSON() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'application/json';
        input.onchange = async (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = async (event) => {
                try {
                    const imported = JSON.parse(event.target.result);
                    showLoading();
                    const rows = imported.map(ev => ({
                        id: ev.id || Date.now().toString() + Math.random().toString(36).substr(2,9),
                        user_id: currentUser.id,
                        date: ev.date, title: ev.title,
                        category: ev.category, sub_category: ev.subCategory,
                        start_time: ev.startTime, end_time: ev.endTime,
                        youtube_url: ev.youtubeUrl, color: ev.color
                    }));
                    const { error } = await sb.from('events').upsert(rows);
                    if (error) { alert('復元に失敗しました: ' + error.message); hideLoading(); return; }
                    await loadEvents();
                    renderCalendar();
                    alert('データを復元しました！');
                    hideLoading();
                } catch (err) {
                    alert('ファイルの読み込みに失敗しました');
                    hideLoading();
                }
            };
            reader.readAsText(file);
        };
        input.click();
    }

    function openSearchModal() {
        document.getElementById('searchKeyword').value = '';
        document.getElementById('searchCategory').value = '';
        document.getElementById('searchSubCategory').innerHTML = '<option value="">サブカテゴリ（すべて）</option>';
        document.getElementById('searchResults').innerHTML = '';
        document.getElementById('searchResultCount').textContent = '';
        document.getElementById('searchFavorite').checked = false;
        document.getElementById('searchStarred').checked = false;
        document.getElementById('searchModal').classList.add('active');
    }

    function closeSearchModal() {
        document.getElementById('searchModal').classList.remove('active');
    }

    function updateSearchSubCategories() {
        const category = document.getElementById('searchCategory').value;
        const subSelect = document.getElementById('searchSubCategory');
        subSelect.innerHTML = '<option value="">サブカテゴリ（すべて）</option>';
        if (category && CATEGORIES[category]) {
            CATEGORIES[category].subCategories.forEach(sub => {
                const opt = document.createElement('option');
                opt.value = sub;
                opt.textContent = sub;
                subSelect.appendChild(opt);
            });
        }
    }

    function doSearch() {
        const keyword = document.getElementById('searchKeyword').value.trim().toLowerCase();
        const category = document.getElementById('searchCategory').value;
        const subCategory = document.getElementById('searchSubCategory').value;

        let results = [...events];

        if (category) results = results.filter(e => e.category === category);
        if (subCategory) results = results.filter(e => e.subCategory === subCategory);
        if (keyword) results = results.filter(e => e.title.toLowerCase().includes(keyword));
        if (document.getElementById('searchFavorite').checked) results = results.filter(e => e.isFavorite);
        if (document.getElementById('searchStarred').checked) results = results.filter(e => e.isStarred);

        // 新しい日付が上
        results.sort((a, b) => b.date.localeCompare(a.date));

        const container = document.getElementById('searchResults');
        const countEl = document.getElementById('searchResultCount');
        container.innerHTML = '';
        countEl.textContent = `${results.length}件見つかりました`;

        if (results.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#aaa; padding:20px;">該当する予定が見つかりませんでした</div>';
            return;
        }

        results.forEach(event => {
            const accentColor = SUB_CATEGORY_COLORS[event.subCategory] || CATEGORIES[event.category].color;
            const div = document.createElement('div');
            div.className = 'search-result-item';
            div.style.cssText = 'display:flex; align-items:center; gap:12px; padding:10px 12px; border-radius:8px; background:#f8f9ff; border-left:4px solid ' + accentColor + ';';

            // サムネイル
            if (event.youtubeUrl) {
                const videoId = extractVideoId(event.youtubeUrl);
                if (videoId) {
                    const thumb = document.createElement('img');
                    thumb.src = `https://img.youtube.com/vi/${videoId}/mqdefault.jpg`;
                    thumb.className = 'search-thumb';
                    thumb.style.cssText = 'width:120px; height:68px; object-fit:cover; border-radius:6px; flex-shrink:0; cursor:pointer;';
                    thumb.onclick = (e) => { e.stopPropagation(); window.open(event.youtubeUrl, '_blank'); };
                    div.appendChild(thumb);
                }
            } else {
                // URLなしの場合はプレースホルダー
                const placeholder = document.createElement('div');
                placeholder.style.cssText = 'width:120px; height:68px; border-radius:6px; flex-shrink:0; background:#ddd; display:flex; align-items:center; justify-content:center; color:#aaa; font-size:11px;';
                placeholder.textContent = 'No Image';
                div.appendChild(placeholder);
            }

            // テキスト情報
            const info = document.createElement('div');
            info.className = 'search-info';
            info.style.cssText = 'flex:1; min-width:0;';
            info.innerHTML = `
                <div style="font-size:12px; color:#888; margin-bottom:4px;">${event.date}　${event.startTime}〜${event.endTime}　<span style="background:${accentColor}; color:white; padding:1px 6px; border-radius:3px; font-size:11px;">${event.subCategory || event.category}</span>${event.isFavorite ? ' 💗' : ''}${event.isStarred ? ' ⭐' : ''}</div>
                <div style="font-size:14px; font-weight:bold; color:#333; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${event.title}</div>
            `;
            div.appendChild(info);

            // 視聴ボタン
            if (event.youtubeUrl) {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.textContent = '▶ 視聴';
                btn.className = 'search-btn';
                btn.style.cssText = 'padding:6px 12px; background:#f08e8e; color:white; border:none; border-radius:6px; cursor:pointer; font-size:12px; white-space:nowrap; flex-shrink:0;';
                btn.onclick = (e) => { e.stopPropagation(); window.open(event.youtubeUrl, '_blank'); };
                div.appendChild(btn);
            }

            container.appendChild(div);
        });
    }

    // Escキー・背景クリックでモーダルを閉じる
    document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); closeSearchModal(); } });
    document.getElementById('eventModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.getElementById('searchModal').addEventListener('click', function(e) { if (e.target === this) closeSearchModal(); });
</script>
</body>
</html>
